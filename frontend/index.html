<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Аналитик документов</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📄 AI Аналитик документов</h1>
        <p>Загрузите PDF и задайте вопрос по его содержанию</p>

        <form id="uploadForm">
            <input type="file" id="fileInput" accept=".pdf">
            <input type="text" id="queryInput" placeholder="Ваш вопрос..." required>
            <button type="submit">Отправить</button>
        </form>

        <div id="result" style="display:none;">
            <h3>Ответ AI:</h3>
            <p id="answerText"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
